<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nourishment | Contact</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <nav>
        <h1 class="logo">Nourishment</h1>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="products.html">Services</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html" class="cta">Start a Pilot</a></li>
        </ul>
    </nav>
</header>

<section class="page-header">
    <h2>Start a Pilot or Contact Us</h2>
</section>

<section class="contact-form">
    <form id="pilotForm">
        <label>Organization Name</label>
        <input type="text" id="org" required>

        <label>Email</label>
        <input type="email" id="email" required>

        <label>Site Type</label>
        <select id="site">
            <option>School</option>
            <option>Housing Complex</option>
            <option>Nonprofit</option>
            <option>Community Center</option>
        </select>

        <label>Preferred Installation Date</label>
        <input type="date" id="date" required>

        <label>Notes</label>
        <textarea id="notes"></textarea>

        <button type="submit">Submit</button>
    </form>

    <div id="formMessage"></div>
</section>

<footer>
    <p>© 2026 Nourishment</p>
</footer>

<script src="js/main.js"></script>
</body>
</html>
